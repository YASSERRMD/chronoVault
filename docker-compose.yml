version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_PATH=/app/data/chronovault.db
      - JWT_SECRET=chronovault-secret-key-change-in-production
      - PORT=8080
    volumes:
      - db-data:/app/data
    networks:
      - chronovault

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080/api
      - VITE_WS_URL=ws://localhost:8080/ws
    depends_on:
      - backend
    networks:
      - chronovault

volumes:
  db-data:

networks:
  chronovault:
    driver: bridge
